<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Note</title>
  <style>
    @font-face {
      font-family: 'Geist';
      font-style: normal;
      font-weight: 400;
      src: url('fonts/Geist-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist';
      font-style: normal;
      font-weight: 500;
      src: url('fonts/Geist-Medium.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist';
      font-style: normal;
      font-weight: 600;
      src: url('fonts/Geist-SemiBold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist Mono';
      font-style: normal;
      font-weight: 400;
      src: url('fonts/GeistMono-Regular.woff2') format('woff2');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0D0D0B;
      color: #E8E4DA;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-user-select: none;
      user-select: none;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6B6760;
      margin-bottom: 8px;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #2A2924;
      border-radius: 8px;
      background: #141412;
      color: #E8E4DA;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color 0.15s ease;
      -webkit-user-select: text;
      user-select: text;
    }

    textarea:focus {
      border-color: #30D158;
      box-shadow: 0 0 0 3px rgba(48, 209, 88, 0.12);
    }

    textarea::placeholder {
      color: #3D3B38;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .hint {
      font-size: 11px;
      color: #3D3B38;
    }

    .hint kbd {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 4px;
      background: #1C1C1A;
      color: #6B6760;
      font-family: 'Geist Mono', 'SF Mono', monospace;
      font-size: 10px;
      border: 1px solid #2A2924;
    }

    .btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .btn-primary {
      background: #30D158;
      color: #0D0D0B;
    }

    .btn-primary:hover { background: #4ADE70; }
    .btn-primary:active { background: #26B348; transform: scale(0.97); }

    .btn-primary:disabled {
      background: #1C1C1A;
      color: #3D3B38;
      cursor: default;
      transform: none;
    }

    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: #30D158;
      color: #0D0D0B;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="label">Note</div>
  <div class="input-wrap">
    <textarea
      id="note-input"
      placeholder="What's happening right now..."
      autofocus
    ></textarea>
  </div>
  <div class="footer">
    <span class="hint"><kbd>&#8984;Return</kbd> to save</span>
    <button class="btn btn-primary" id="save-btn" disabled>Save Note</button>
  </div>
  <div class="toast" id="toast">Note saved</div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;

    const input = document.getElementById('note-input');
    const btn = document.getElementById('save-btn');
    const toast = document.getElementById('toast');

    input.addEventListener('input', () => {
      btn.disabled = !input.value.trim();
    });

    async function saveNote() {
      const text = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      try {
        await invoke('cmd_add_note', { text });
        input.value = '';

        // Flash success
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => {
            getCurrentWebviewWindow().close();
          }, 200);
        }, 600);
      } catch (e) {
        // Not recording — show inline
        toast.textContent = e;
        toast.style.background = '#FF453A';
        toast.style.color = '#fff';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', saveNote);

    // Cmd+Enter to save, Escape to close
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        saveNote();
      }
      if (e.key === 'Escape') {
        getCurrentWebviewWindow().close();
      }
    });

    // Focus the textarea on window show
    input.focus();
  </script>
</body>
</html>
